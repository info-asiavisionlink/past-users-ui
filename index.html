<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <title>過去参加者マッチング | Past Participants</title>
    <link rel="stylesheet" href="matching.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="app-header">
        <h1 class="app-title">交流したい方を選ぶ</h1>
        <p class="app-subtitle">最大10名まで選択できます</p>
      </header>

      <main class="app-main">
        <section id="state-loading" class="state state-loading" aria-live="polite" aria-busy="true">
          <div class="spinner" role="status"></div>
          <p>読み込み中…</p>
        </section>

        <section id="state-error" class="state state-error hidden" aria-live="assertive">
          <p class="state-error-title">読み込みに失敗しました</p>
          <p id="error-message" class="state-error-detail"></p>
          <button type="button" class="btn btn-secondary" id="retry-btn">再試行</button>
        </section>

        <div id="state-content" class="hidden">
          <section class="section section-profile" aria-labelledby="profile-heading">
            <h2 id="profile-heading" class="section-label">あなたのプロフィール</h2>
            <article class="card card-profile" id="current-user-card">
              <p class="profile-name" id="current-user-name">—</p>
              <p class="profile-company" id="current-user-company">—</p>
            </article>
          </section>

          <section class="section section-list" aria-labelledby="participants-heading">
            <h2 id="participants-heading" class="section-label">過去の参加者</h2>
            <ul class="participant-list" id="participant-list"></ul>
          </section>

          <footer class="app-footer">
            <p id="selection-count" class="selection-count" aria-live="polite">0 / 10 名を選択中</p>
            <button type="button" class="btn btn-primary" id="submit-btn" disabled>
              選択した人に交流申請する
            </button>
            <p id="submit-success" class="submit-success hidden" role="status" aria-live="polite"></p>
          </footer>
        </div>
      </main>
    </div>

    <script src="matching.js" type="module"></script>
  </body>
</html>
